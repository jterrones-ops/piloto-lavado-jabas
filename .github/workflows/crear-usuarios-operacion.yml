name: Crear usuarios por operación
# Incluye la cuenta global de pruebas.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/crear-usuarios-operacion.yml"
  workflow_dispatch:

jobs:
  crear:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Crear o actualizar usuarios
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python tools/create_operation_users.py
